name: Mirror Scorpion Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Prepare Project and Build
        run: |
          set -e
          # Get dependencies
          flutter pub get
          
          # Fix Namespace issue for dash_bubble and other potential libraries in pub-cache
          echo "Fixing namespaces in pub-cache..."
          find ~/.pub-cache -name "build.gradle" -exec sed -i '/android {/a \    namespace "com.example.fix"' {} +
          
          # Patch app/build.gradle in the current workspace
          # Ensure namespace is set in the app itself
          sed -i 's/namespace .*/namespace "com.tetocollctionway.mirror_scorpion_translate"/g' android/app/build.gradle
          
          # Apply user patches if they exist
          if [ -f "scripts/patch_gradle.py" ]; then
            python3 scripts/patch_gradle.py android/app/build.gradle
          fi
          
          # Build APK
          flutter build apk --release
          
          # Move output to workspace
          mkdir -p output_apk
          cp build/app/outputs/flutter-apk/app-release.apk output_apk/
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mirror-scorpion-release
          path: output_apk/app-release.apk
          if-no-files-found: error
