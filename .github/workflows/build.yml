name: Mirror Scorpion Build
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create and build
        run: |
          cd /tmp
          mkdir -p clean
          cd /tmp/clean
          flutter create --org com.tetocollctionway --project-name mirror_scorpion_translate .
          rm -rf lib assets
          cp -r $GITHUB_WORKSPACE/lib .
          cp -r $GITHUB_WORKSPACE/assets .
          cp $GITHUB_WORKSPACE/pubspec.yaml .

          # تعديل android/app/build.gradle.kts - فقط تغيير minSdk
          python3 -c "
with open('android/app/build.gradle.kts', 'r') as f:
    content = f.read()
content = content.replace('minSdk = flutter.minSdkVersion', 'minSdk = 21')
# أضف isMinifyEnabled = false في release
content = content.replace(
    'isMinifyEnabled = true',
    'isMinifyEnabled = false'
)
with open('android/app/build.gradle.kts', 'w') as f:
    f.write(content)
print('build.gradle.kts patched')
"
          flutter pub get
          flutter build apk --release
          mkdir -p $GITHUB_WORKSPACE/output_apk
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/output_apk/
      - uses: actions/upload-artifact@v4
        with:
          name: mirror-scorpion-release
          path: output_apk/app-release.apk
          if-no-files-found: error
