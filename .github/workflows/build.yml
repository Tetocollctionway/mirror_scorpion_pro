name: Mirror Scorpion Build
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.0'

      - name: Build Project
        run: |
          cd ..
          flutter create --org com.tetocollctionway --project-name mirror_scorpion_translate clean_project
          rm -rf clean_project/lib clean_project/assets clean_project/pubspec.yaml
          
          # النسخ من المجلد الصحيح 100%
          cp -r mirror_scorpion_translate1/lib clean_project/
          cp -r mirror_scorpion_translate1/assets clean_project/
          cp mirror_scorpion_translate1/pubspec.yaml clean_project/

          # حقن إعدادات الأندرويد الصريحة في build.gradle لحل مشكلة speech_to_text نهائياً
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' clean_project/android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' clean_project/android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' clean_project/android/app/build.gradle
          
          # حل بديل وقاتل لو الـ sed ما لقتش الأسطر التلقائية: إجبار الجرادل على إصدار 34
          echo "android.compileSdkVersion = 34" >> clean_project/android/local.properties
          echo "android.targetSdkVersion = 34" >> clean_project/android/local.properties
          echo "android.minSdkVersion = 21" >> clean_project/android/local.properties

          cd clean_project
          flutter pub get
          flutter build apk --release

          mkdir -p ../mirror_scorpion_translate1/output_apk
          cp build/app/outputs/flutter-apk/app-release.apk ../mirror_scorpion_translate1/output_apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mirror-scorpion-release
          path: output_apk/app-release.apk
