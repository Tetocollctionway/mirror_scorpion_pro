name: dash_bubble_local
description: "Local vendored version of dash_bubble with R reference fixes"
version: 2.0.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.moaz.dash_bubble
        pluginClass: DashBubblePlugin
